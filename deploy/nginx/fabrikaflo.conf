# fabrikaflo.mooo.com — admin panel, Telegram Mini App, API, bot webhook
#
# Paths match Vite base paths:
#   admin       -> /admin/       (admin SPA)
#   webapp      -> /webapp/      (Telegram Mini App)
#   fabrikaflo_bot -> :3000      (Fastify API + Grammy webhook)

server {
    listen 80;
    server_name fabrikaflo.mooo.com;

    client_max_body_size 20M;

  # Public entry — Telegram Mini App
    location = / {
        return 302 /webapp/;
    }

  # Admin panel (Vite base: /admin/)
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/fabrikaflo/admin/dist/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

  # Telegram Mini App (Vite base: /webapp/)
    location = /webapp {
        return 301 /webapp/;
    }

    location /webapp/ {
        alias /var/www/fabrikaflo/webapp/dist/;
        try_files $uri $uri/ /webapp/index.html;

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

  # Backend API (Fastify prefix: /api/fabrika)
    location /api/fabrika {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

  # Telegram bot webhook (Grammy registers POST /bot<token>)
    location /bot {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
